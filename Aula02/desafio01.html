<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="./favicon.jpg">
    <title>Exercício 01 - JAVASCRIPT</title>
    <meta name="description" content="...">
    <meta name="keywords" content="sites, web, frontend">
    <meta name="author" content="Maria Eduarda">

</head>
<body>
    <h1>MANIPULANDO ELEMENTOS (TAGS) DO HTML ATRAVÉS DO JS</h1>
    <hr>
    <div>
        <p>ESTAMOS APRENDENDO JAVASCRIPT</p>
        <hr>
        <p>Aprender é Muito Legal</p>
        <p>E para ajudar o aprendizado, é PRECISO praticar e exercitar</p>
    </div>
    <script>
        const tags_p = document.getElementsByTagName('p');
        console.log("MINHAS TAGS <p> ", tags_p);

        let tag_p_1 = tags_p[0]
        tag_p_1.style.backgroundColor="#FFB6C1";
        tag_p_1.style.color="white";
        tag_p_1.style.padding="11px";
        tag_p_1.style.borderRadius="22px";
        tag_p_1.style.marginLeft="7px";
        tag_p_1.style.marginRight="7px";
        tag_p_1.style.textAlign="center";

        let tag_p_2 = tags_p[1]    
        tag_p_2.style.backgroundColor="#FFB6C1";
        tag_p_2.style.color="white";
        tag_p_2.style.padding="2px";
        tag_p_2.style.borderRadius="22px";
        tag_p_2.style.marginLeft="7px";
        tag_p_2.style.marginRight="7px";
        tag_p_2.style.textAlign="center";

        let tag_p_3 = tags_p[2]
        tag_p_3.style.backgroundColor="#FFB6C1";
        tag_p_3.style.color="white";
        tag_p_3.style.padding="2px";
        tag_p_3.style.borderRadius="22px";
        tag_p_3.style.marginLeft="7px";
        tag_p_3.style.marginRight="7px";
        tag_p_3.style.textAlign="center";

        const tags_div = document.getElementsByTagName('div');
        console.log("MINHAS TAGS <div> ", tags_div);

        let tag_div_1 = tags_div[0]
        tag_div_1.style.backgroundColor="#E6D6FF";
        tag_div_1.style.marginLeft="7px";
        tag_div_1.style.marginRight="7px";
        tag_div_1.style.padding="8px";
        tag_div_1.style.borderRadius="22px";

        const tags_body = document.getElementsByTagName('body');
        console.log("MINHAS TAGS <body> ", tags_body);
        
        let tag_body_1 = tags_body[0]
        tag_body_1.style.backgroundColor="#89CFF0";

    </script>
    
</body>
</html>
