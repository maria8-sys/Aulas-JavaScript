<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="img/favicon.jpg">
    <title>Desafio 2 - Troca de imagem</title>
</head>
<body>
    <h1><mark>DESAFIO 2</mark> ALTERANDO IMAGEM VIA JS</h1>
    <hr>
    <div>
        <img id="imagemPrincipal" src="img/rihanna.jpg" alt="Imagem do Desafio" width="300">
    </div>
    <hr>

    <script>
        const imagem = document.getElementById('imagemPrincipal');
        imagem.src = 'img/rihanna.jpg';

        
    </script>
</body>
</html>
