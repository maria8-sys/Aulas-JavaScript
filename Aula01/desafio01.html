<body>
    <script>
        <h1>REALIZANDO OPERAÇÃO COM NÚMEROS EM JS</h1>
        const num1 = Number(prompt("Digite o primeiro número:"));
        const num2 = Number(prompt("Digite o segundo número:"));
        
        const operacao = prompt("Qual operação deseja realizar? (soma ou subtração)").toLowerCase();

        if (operacao === "soma") {
            const resultado = num1 + num2;
            alert("O resultado da soma é: " + resultado);
        } else if (operacao === "subtração" || operacao === "subtracao") {
            const resultado = num1 - num2;
            alert("O resultado da subtração é: " + resultado);
        } else {
            alert("Recarregue a página e tente novamente.");
        }
    </script>
</body>
