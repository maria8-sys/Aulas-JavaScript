<body>
    <h1><mark>Aula 03</mark> exercício 01</h1>
    <hr>
    <input type="button" onclick="triste();" value="FELIZ">
    <input type="button" onclick="feliz();" value="TRISTE">
    <img src="cara triste.jpg" id="rosto" style="width: 350px;">
    <script>
        function triste(){
            var tag_img = document.getElementsByName('img')[0]
            console.log(tag_img)
            tag_img.src="cara feliz.jpg";
        }
        function feliz(){
            var tag_img = document.getElementsByTagName('img')[0]
            console.log(tag_img)
            tag_img.src="cara triste.jpg";

        }
    </script>
